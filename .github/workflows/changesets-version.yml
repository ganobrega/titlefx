# Opens / updates the "Version packages" PR when there are .changeset/*.md files on main.
# Does NOT publish to npm — see publish-on-tag.yml after you merge that PR and push a tag.

name: Changesets version

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Open version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Create or update Version packages PR
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
