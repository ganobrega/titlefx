# Opens / updates the "Version packages" PR when there are pending .changeset/*.md files on main.
# Does NOT publish to npm — see auto-tag-version.yml (draft release) and publish-on-release.yml.
#
# Runs only when this push touches .changeset/ (path filter). Merges that only delete consumed
# changesets still match the path, so we skip the action when no pending *.md remain.

name: Changesets version

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Open version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Count pending changesets
        id: pending
        shell: bash
        run: |
          shopt -s nullglob
          count=0
          for f in .changeset/*.md; do
            base=$(basename "$f")
            if [[ "$base" == "README.md" ]]; then
              continue
            fi
            count=$((count + 1))
          done
          echo "count=${count}" >> "${GITHUB_OUTPUT}"
          echo "Pending changeset files (excl. README): ${count}"

      - uses: actions/setup-node@v6
        if: github.event_name == 'workflow_dispatch' || steps.pending.outputs.count != '0'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: github.event_name == 'workflow_dispatch' || steps.pending.outputs.count != '0'

      - name: Create or update Version packages PR
        if: github.event_name == 'workflow_dispatch' || steps.pending.outputs.count != '0'
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
