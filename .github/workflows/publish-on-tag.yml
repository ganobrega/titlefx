# Publishes to npm when you push a version tag (e.g. v0.2.0) after merging the Version packages PR.
# Configure npm Trusted publishing with this workflow filename: publish-on-tag.yml

name: Publish on tag

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.6.2 && npm -v

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build and publish
        run: npm run release
