# Publishes to npm when a GitHub Release is published (not draft, not prerelease).
# Draft releases are created by auto-tag-version.yml; after you
# click "Publish release" on GitHub, this workflow runs.
# Configure npm Trusted publishing with this workflow filename: publish-on-release.yml

name: Publish on release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.6.2 && npm -v

      - run: npm ci

      - name: Build and publish
        run: npm run release
