# When package.json version changes on main, opens a draft GitHub Release for v<version>.
# Publishing that release (GitHub UI) creates the tag and triggers publish-on-release.yml → npm.

name: Draft release on version bump

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  contents: write

concurrency:
  group: draft-release-main
  cancel-in-progress: false

jobs:
  draft:
    name: Create draft GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" &>/dev/null; then
            echo "Release ${TAG} already exists; skipping."
            exit 0
          fi
          echo "Creating draft release ${TAG} at ${GITHUB_SHA}"
          gh release create "${TAG}" \
            --draft \
            --title "${TAG}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}"
