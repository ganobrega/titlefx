# After a Version packages merge, package.json on main has the new version.
# This workflow creates and pushes v<version> if that tag does not exist yet,
# which triggers publish-on-tag.yml.

name: Auto-tag version

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push release tag if missing
        run: |
          set -e
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"
          git fetch origin --tags --quiet 2>/dev/null || true
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on origin, nothing to do."
            exit 0
          fi
          echo "Pushing new tag ${TAG} (package.json version ${VERSION})"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" HEAD
          git push origin "${TAG}"
